name: CI

# Běží jen na PR do main — po mergi je kód už ověřený a deploy.yml build stejně provádí.
# Tím odpadne duplicitní běh (PR + push) a šetří se minuty Actions.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:5249"
          NEXT_PUBLIC_SIGNALR_URL: "http://localhost:5249/hubs"
          NEXT_PUBLIC_DEV_AUTH: "true"
          NEXT_PUBLIC_AZURE_AD_CLIENT_ID: "00000000-0000-0000-0000-000000000000"
          NEXT_PUBLIC_AZURE_AD_TENANT_ID: "00000000-0000-0000-0000-000000000000"
